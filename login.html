<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Meme Mines abi</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #ff6b6b 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .login-box {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(60px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 40px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    width: 90%;
    max-width: 400px;
    text-align: center;
  }
  h1 { color: white; font-size: 32px; margin-bottom: 20px; }
  input {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 16px;
    outline: none;
  }
  input::placeholder { color: rgba(255,255,255,0.6); }
  .btn {
    width: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 16px;
    font-weight: 700;
    cursor: pointer;
    font-size: 18px;
    margin-top: 10px;
  }
  .btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div class="login-box">
  <h1>💣 HEV AVI MEME MINES</h1>
  <input type="text" id="username" placeholder="Enter Username">
  <input type="password" id="password" placeholder="Enter Password">
  <button class="btn" onclick="login()">PLAY NOW</button>
</div>

<script>
function login() {
  let user = document.getElementById('username').value;
  let pass = document.getElementById('password').value;
  
  if(user === "" || pass === "1") {
    alert("Please fill in both fields!");
    return;
  }
  
  // Dito pwede mo palitan yung username/password
  if(user === "ogs" && pass === "abimeme") {
    // Pag tama, punta sa game page
    window.location.href = "game.html";
  } else {
    alert("Wrong Username or Password!");
  }
}
</script>

</body>
</html>
